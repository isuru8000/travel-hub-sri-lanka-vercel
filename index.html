<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Hub Sri Lanka | Ancient Memories, Modern Journeys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --theme-primary: #0EA5E9;
        --theme-secondary: #3B82F6;
        --theme-accent: #0284C7;
        --theme-blue: #0EA5E9;
        --theme-midnight: #0a0a0a;
        --theme-cream: #fdfcf9;
        --theme-gold: #c5a059;
      }

      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fafafa;
        scroll-behavior: auto !important; /* Lenis handles this */
        -webkit-overflow-scrolling: touch;
      }
      
      /* Lenis Recommended CSS */
      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }

      /* Custom Premium Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
        border: 2px solid #f1f1f1;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0EA5E9;
      }
      h1, h2, h3, h4, .font-heritage {
        font-family: 'Cormorant Garamond', serif;
      }
      .font-script {
        font-family: 'Great Vibes', cursive;
      }
      .font-narrative {
        font-family: 'Playfair Display', serif;
      }
      
      .insta-gradient {
        background: linear-gradient(45deg, #0EA5E9 0%, #3B82F6 25%, #2563EB 50%, #1D4ED8 75%, #1E40AF 100%);
      }
      
      .insta-text-gradient {
        background: linear-gradient(45deg, var(--theme-secondary) 0%, var(--theme-primary) 50%, var(--theme-accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
      }

      .blue-text-gradient {
        background: linear-gradient(45deg, #0EA5E9 0%, #3B82F6 50%, #2563EB 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      .animate-gradient-text-slow {
        background: linear-gradient(270deg, #0EA5E9, #3B82F6, #2563EB, #60A5FA, #93C5FD);
        background-size: 400% 400%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradient-shift 15s ease infinite;
      }

      .story-ring {
        padding: 3px;
        background: linear-gradient(45deg, var(--theme-secondary) 0%, var(--theme-primary) 50%, var(--theme-accent) 100%);
      }
      
      .pattern-overlay {
        background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        opacity: 0.05;
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes glint {
        0% { transform: translateX(-150%) skewX(-35deg); }
        100% { transform: translateX(150%) skewX(-35deg); }
      }
      .hover-glint:hover::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 200%;
        height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
        animation: glint 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 20;
        pointer-events: none;
      }

      :focus-visible {
        outline: 3px solid var(--theme-primary);
        outline-offset: 4px;
        border-radius: 4px;
      }

      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Mobile Specific Enhancements */
      @media (max-width: 768px) {
        h1 { font-size: 2.5rem !important; line-height: 1.1 !important; }
        h2 { font-size: 2rem !important; }
        .text-6xl { font-size: 3rem !important; }
        .text-7xl { font-size: 3.5rem !important; }
        .text-8xl { font-size: 4rem !important; }
        .text-9xl { font-size: 5rem !important; }
        .py-20 { padding-top: 3rem !important; padding-bottom: 3rem !important; }
        .py-32 { padding-top: 4rem !important; padding-bottom: 4rem !important; }
        .px-12 { padding-left: 1.5rem !important; padding-right: 1.5rem !important; }
        .gap-20 { gap: 2.5rem !important; }
        .rounded-\[5rem\] { border-radius: 3rem !important; }
        .rounded-\[4rem\] { border-radius: 2.5rem !important; }
        .p-20 { padding: 2.5rem !important; }
        .p-12 { padding: 2rem !important; }
        
        /* Smooth transitions for mobile */
        * {
          -webkit-tap-highlight-color: transparent;
        }
        
        /* Ensure small text is still readable but compact */
        .text-xl { font-size: 1.125rem !important; }
        .text-2xl { font-size: 1.25rem !important; }
        .text-3xl { font-size: 1.5rem !important; }
      }
    </style>
<script type="importmap">
{

    "vite": "https://esm.sh/vite@^7.3.1",

</head>
  <body class="bg-[#fafafa] text-[#262626]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Global smooth scroll for all anchor links
      document.addEventListener('click', function (e) {
        const target = e.target.closest('a[href^="#"]');
        if (target) {
          const href = target.getAttribute('href');
          if (href === '#') return;
          e.preventDefault();
          const element = document.querySelector(href);
          if (element) {
            element.scrollIntoView({
              behavior: 'smooth'
            });
          }
        }
      });
    </script>
  </body>
</html>
